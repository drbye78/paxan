name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (e.g., v1.0.0, v2.3.4)

permissions:
  contents: write  # Required for creating releases and uploading assets

jobs:
  build-and-release:
    name: Build and Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install crx3 for CRX building
        run: npm install -g crx3

      - name: Setup PEM file for signing
        # Create PEM file from secret if available
        env:
          CRX_PEM_FILE_CONTENT: ${{ vars.CRX_PEM_FILE || secrets.CRX_PEM_FILE }}
        run: |
          if [ -n "$CRX_PEM_FILE_CONTENT" ]; then
            echo "Setting up PEM file from secret..."
            echo "$CRX_PEM_FILE_CONTENT" > proxy-vpn-extension.pem
            echo "PEM file created successfully"
          else
            echo "⚠️ No CRX_PEM_FILE secret found. CRX signing will be skipped."
            echo "Add CRX_PEM_FILE secret in repository settings to enable CRX signing."
          fi

      - name: Build distribution packages
        run: npm run distribute

      - name: Verify build artifacts
        run: |
          echo "=== Distribution Files ==="
          ls -la dist/
          echo "=== File Sizes ==="
          du -h dist/*
          echo "=== File Types ==="
          file dist/*

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## ProxyMania VPN Extension ${{ github.ref_name }}

            ### 📦 Installation

            #### Manual Installation
            1. Download `proxy-vpn-extension.zip`
            2. Extract to a folder
            3. Open `chrome://extensions/`
            4. Enable "Developer mode"
            5. Click "Load unpacked" and select the extracted folder

            #### Direct CRX Installation
            1. Download `proxy-vpn-extension.crx`
            2. Open `chrome://extensions/`
            3. Enable "Developer mode"
            4. Drag and drop the CRX file

            ### 🔧 Changes

            See the [CHANGELOG](CHANGELOG.md) for detailed changes.

            ### 📋 Files

            - `proxy-vpn-extension.zip` - Distribution package for Chrome Web Store
            - `proxy-vpn-extension.crx` - Direct installation package
          files: |
            dist/proxy-vpn-extension.zip
            dist/proxy-vpn-extension.crx
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
