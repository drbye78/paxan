name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (e.g., v1.0.0, v2.3.4)

permissions:
  contents: write  # Required for creating releases and uploading assets

jobs:
  # Chrome Extension Build
  build-chrome:
    name: Build Chrome Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install crx3 for CRX building
        run: npm install -g crx3

      - name: Setup PEM file for signing
        env:
          CRX_PEM_FILE_CONTENT: ${{ vars.CRX_PEM_FILE || secrets.CRX_PEM_FILE }}
        run: |
          if [ -n "$CRX_PEM_FILE_CONTENT" ]; then
            echo "Setting up PEM file from secret..."
            echo "$CRX_PEM_FILE_CONTENT" > proxy-vpn-extension.pem
            echo "PEM file created successfully"
          else
            echo "⚠️ No CRX_PEM_FILE secret found. CRX signing will be skipped."
          fi

      - name: Build distribution packages
        run: npm run distribute

      - name: Upload Chrome artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chrome-artifacts
          path: |
            dist/proxy-vpn-extension.zip
            dist/proxy-vpn-extension.crx

  # Android APK Build
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build Android APK
        run: ./gradlew assembleRelease

      - name: Copy APK to dist
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release-unsigned.apk dist/proxymania-android-release-unsigned.apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: dist/proxymania-android-release-unsigned.apk

  # Create Release with all artifacts
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-chrome, build-android]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== All Artifacts ==="
          find artifacts -type f -name "*.apk" -o -name "*.zip" -o -name "*.crx"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## ProxyMania VPN ${{ github.ref_name }}

            ### 📦 Installation

            #### Chrome Extension
            1. Download `proxy-vpn-extension.zip`
            2. Extract to a folder
            3. Open `chrome://extensions/`
            4. Enable "Developer mode"
            5. Click "Load unpacked" and select the extracted folder

            #### Android App
            1. Download `proxymania-android-release-unsigned.apk`
            2. Enable "Install from unknown sources" in settings
            3. Open the APK file and install

            ### 🔧 Changes

            See the [CHANGELOG](CHANGELOG.md) for detailed changes.

            ### 📋 Files

            | File | Description |
            |------|-------------|
            | `proxy-vpn-extension.zip` | Chrome Extension (Web Store) |
            | `proxy-vpn-extension.crx` | Chrome Extension (Sideload) |
            | `proxymania-android-release-unsigned.apk` | Android App |
          files: |
            artifacts/chrome-artifacts/proxy-vpn-extension.zip
            artifacts/chrome-artifacts/proxy-vpn-extension.crx
            artifacts/android-artifacts/proxymania-android-release-unsigned.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
